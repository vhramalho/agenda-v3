<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json?v=20260717m" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg?v=20260717m" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=20260717m" />
  <meta name="theme-color" content="#0B0B10" />
  <title>Melhores clientes — Swipo Agenda</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260717m" />
  <link rel="stylesheet" href="css/base.css?v=20260717m" />
  <link rel="stylesheet" href="css/layout.css?v=20260717m" />
  <link rel="stylesheet" href="css/components.css?v=20260717m" />
</head>
<body data-page="clientes">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Melhores clientes</h1>
        <button class="icon-btn icon-btn--accent" id="js-btn-filtrar" aria-label="Filtrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4-2v-4z"/></svg>
        </button>
      </header>

      <div class="segmented section">
        <button class="icon-btn" id="js-ano-anterior" aria-label="Ano anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span id="js-ano-label" style="flex:1;text-align:center;font-weight:700;font-size:var(--text-sm);"></span>
        <button class="icon-btn" id="js-ano-proximo" aria-label="Próximo ano">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="segmented section">
        <span class="segmented__item is-active" data-metrica="faturamento">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.5 1.5-2 3-2s3 .8 3 2-1.5 2-3 2-3 .5-3 2 1.5 2 3 2 3-.5 3-2"/></svg>
          Faturamento
        </span>
        <span class="segmented__item" data-metrica="visitas">
          Visitas
        </span>
        <span class="segmented__item" data-metrica="ticket">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
          Ticket médio
        </span>
        <span class="segmented__item" data-metrica="compras">
          Compras
        </span>
      </div>

      <div class="card section" id="js-ranking-tabela"></div>
      <div class="empty-state is-hidden" id="js-ranking-vazio"><p class="empty-state__title">Ainda não há atendimentos realizados</p></div>

      <p class="text-secondary section" style="text-align:center;margin-top:var(--space-5);">
        O ranking é atualizado automaticamente todos os dias com base nos dados de <span id="js-ranking-ano-texto"></span>.
      </p>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <div class="modal-overlay is-hidden" id="modal-filtrar-periodo">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Filtrar período</p><button class="modal-close">✕</button></div>

        <div class="segmented section" id="js-filtro-tipo">
          <span class="segmented__item is-active" data-tipo="ano">Ano</span>
          <span class="segmented__item" data-tipo="mes">Mês</span>
          <span class="segmented__item" data-tipo="personalizado">Personalizado</span>
        </div>

        <div id="js-filtro-campo-ano">
          <div class="segmented">
            <button class="icon-btn" id="js-filtro-ano-anterior" aria-label="Ano anterior">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span id="js-filtro-ano-label" style="flex:1;text-align:center;font-weight:700;"></span>
            <button class="icon-btn" id="js-filtro-ano-proximo" aria-label="Próximo ano">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>

        <div id="js-filtro-campo-mes" class="is-hidden">
          <div class="segmented">
            <button class="icon-btn" id="js-filtro-mes-anterior" aria-label="Mês anterior">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span id="js-filtro-mes-label" style="flex:1;text-align:center;font-weight:700;"></span>
            <button class="icon-btn" id="js-filtro-mes-proximo" aria-label="Próximo mês">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>

        <div id="js-filtro-campo-personalizado" class="is-hidden">
          <div class="field"><label class="field__label">De</label><input type="date" class="input" id="js-filtro-data-inicio"/></div>
          <div class="field"><label class="field__label">Até</label><input type="date" class="input" id="js-filtro-data-fim"/></div>
        </div>

        <div class="btn-row" style="margin-top:var(--space-4);"><button class="btn btn--primary" id="js-filtro-aplicar">Aplicar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=20260717m"></script>
  <script src="js/menu.js?v=20260717m"></script>
  <script src="js/storage.js?v=20260717m"></script>
  <script src="js/tema.js?v=20260717m"></script>
  <script src="js/app.js?v=20260717m"></script>
  <script src="js/chips.js?v=20260717m"></script>
  <script src="js/modal.js?v=20260717m"></script>
  <script src="js/clientes-derivadas.js?v=20260717m"></script>
</body>
</html>
