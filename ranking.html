<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ranking — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="clientes" data-titulo="Ranking">
  <div class="app">
    <main class="page">
      <div id="js-header-mount"></div>

      <p class="text-secondary section">Veja seus melhores clientes de acordo com o resultado que mais importa para você.</p>

      <div class="segmented section">
        <span class="segmented__item is-active" data-metrica="faturamento">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.5 1.5-2 3-2s3 .8 3 2-1.5 2-3 2-3 .5-3 2 1.5 2 3 2 3-.5 3-2"/></svg>
          Faturamento
        </span>
        <span class="segmented__item" data-metrica="visitas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17" cy="9" r="2.5"/><path d="M15.5 14c2.6.4 4.5 2.4 4.5 6"/></svg>
          Visitas
        </span>
        <span class="segmented__item" data-metrica="ticket">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
          Ticket médio
        </span>
      </div>

      <div class="podio" id="js-ranking-podio"></div>

      <div class="table-header-row row--between" style="display:flex;">
        <span>Posição</span>
        <span style="flex:1;margin-left:40px;">Cliente</span>
        <span class="text-primary-accent" style="margin-right:24px;" id="js-ranking-coluna">Faturamento ▾</span>
        <span id="js-ranking-coluna-secundaria">Visitas</span>
      </div>

      <div class="card" id="js-ranking-tabela"></div>
      <div class="empty-state is-hidden" id="js-ranking-vazio"><p class="empty-state__title">Ainda não há atendimentos realizados</p></div>

      <p class="text-secondary section" style="text-align:center;margin-top:var(--space-5);">
        O ranking é atualizado automaticamente todos os dias com base nos dados dos últimos 12 meses.
      </p>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chips.js"></script>
  <script src="js/clientes-derivadas.js"></script>
</body>
</html>
