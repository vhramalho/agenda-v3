<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Produtos — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260709d" />
  <link rel="stylesheet" href="css/base.css?v=20260709d" />
  <link rel="stylesheet" href="css/layout.css?v=20260709d" />
  <link rel="stylesheet" href="css/components.css?v=20260709d" />
</head>
<body data-page="mais">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Produtos</h1>
        <button class="icon-btn icon-btn--accent" aria-label="Novo produto" id="js-btn-novo-produto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>

      <section class="section">
        <h2 class="section__title">Todos os produtos</h2>
        <div class="card" id="js-lista-produtos"></div>
        <div class="empty-state is-hidden" id="js-produtos-vazio">
          <p class="empty-state__title">Nenhum produto cadastrado</p>
          <p class="text-muted">Toque no + acima para criar o primeiro.</p>
        </div>
      </section>

      <a href="ranking-produtos.html" class="card card--destaque is-hidden" id="js-produto-destaque" style="display:block;text-decoration:none;color:inherit;">
        <div class="row row--between" style="margin-bottom:12px;">
          <span style="font-weight:700;">Mais vendidos</span>
        </div>
        <div id="js-produto-top3"></div>
        <p class="text-primary-accent" style="text-align:center;font-weight:600;margin-top:12px;">Ver ranking completo</p>
      </a>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <!-- Modais de produto -->
    <div class="modal-overlay is-hidden" id="modal-novo-produto">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Novo produto</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome do produto</label><input class="input" id="js-novo-produto-nome" placeholder="Ex.: Óleo de barba"/></div>
        <div class="field"><label class="field__label">Preço de venda</label><input class="input" id="js-novo-produto-preco-venda" placeholder="R$ 0,00"/></div>
        <div class="field"><label class="field__label">Preço de custo (opcional)</label><input class="input" id="js-novo-produto-preco-custo" placeholder="R$ 0,00"/></div>
        <div class="field"><label class="field__label">Estoque</label><input class="input" type="number" min="0" step="1" id="js-novo-produto-estoque" placeholder="0"/></div>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-novo-produto-salvar">Salvar</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-editar-produto">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Editar produto</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome do produto</label><input class="input" id="js-editar-produto-nome"/></div>
        <div class="field"><label class="field__label">Preço de venda</label><input class="input" id="js-editar-produto-preco-venda"/></div>
        <div class="field"><label class="field__label">Preço de custo (opcional)</label><input class="input" id="js-editar-produto-preco-custo"/></div>
        <div class="field"><label class="field__label">Estoque</label><input class="input" type="number" min="0" step="1" id="js-editar-produto-estoque"/></div>
        <div class="btn-row"><button class="btn btn--primary" id="js-editar-produto-salvar">Salvar</button><button class="btn btn--danger" data-trocar-modal="modal-confirmar-exclusao-produto">Excluir</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-confirmar-exclusao-produto">
      <div class="modal-sheet" style="text-align:center;">
        <div class="modal-sheet__header" style="text-align:left;"><p class="modal-sheet__title">Excluir produto?</p><button class="modal-close">✕</button></div>
        <p class="text-secondary" style="margin-bottom:20px;">Tem certeza que deseja excluir este produto? Essa ação não pode ser desfeita.</p>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--danger-solid" id="js-confirmar-exclusao-produto">Confirmar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=20260709d"></script>
  <script src="js/menu.js?v=20260709d"></script>
  <script src="js/storage.js?v=20260709d"></script>
  <script src="js/tema.js?v=20260709d"></script>
  <script src="js/app.js?v=20260709d"></script>
  <script src="js/chips.js?v=20260709d"></script>
  <script src="js/modal.js?v=20260709d"></script>
  <script src="js/acoes-simuladas.js?v=20260709d"></script>
  <script src="js/ranking-produtos.js?v=20260709d"></script>
  <script src="js/produtos.js?v=20260709d"></script>
</body>
</html>
