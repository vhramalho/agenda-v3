<!--
  Componente: Header de página secundária (voltar + título centralizado)
  Usado em telas como Cliente-detalhe, Ranking, Aniversariantes, etc.
  Carregado via js/utils.js (loadComponent). Depois de injetado, defina o
  título com: document.getElementById('js-page-title').textContent = '...'
-->
<header class="app-header">
  <button class="icon-btn" id="js-btn-voltar" aria-label="Voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <h1 class="app-header__title" id="js-page-title">Título</h1>
  <div class="icon-btn" style="visibility:hidden" aria-hidden="true"></div>
</header>
