<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aniversariantes — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="clientes" data-titulo="Aniversariantes">
  <div class="app">
    <main class="page">
      <div id="js-header-mount"></div>

      <p class="text-secondary section">Veja os clientes que fazem aniversário e envie uma mensagem especial.</p>

      <div class="insight-card section">
        <p class="insight-card__label"><span>Aniversariantes</span></p>
        <p class="insight-card__valor" id="js-aniv-contagem-numero"></p>
        <p class="insight-card__comparacao text-secondary" id="js-aniv-contagem-mes"></p>
      </div>

      <div class="field section">
        <label class="field__label">Mês</label>
        <div class="select-like">
          <button class="icon-btn" id="js-aniv-anterior" aria-label="Mês anterior" style="width:32px;height:32px;flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <svg width="18" height="18" style="color:var(--primary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
          <span id="js-aniv-mes-label"></span>
          <button class="icon-btn" id="js-aniv-proximo" aria-label="Próximo mês" style="width:32px;height:32px;flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>

      <h2 class="text-primary-accent" style="font-weight:700;font-size:var(--text-sm);margin-bottom:12px;" id="js-aniv-titulo">Aniversariantes</h2>
      <div class="card section" id="js-aniv-lista"></div>
      <div class="empty-state is-hidden section" id="js-aniv-vazio"><p class="empty-state__title">Nenhum aniversariante neste mês</p></div>

      <div class="card row">
        <span style="font-size:22px;">🔔</span>
        <p class="text-secondary">As mensagens de aniversário usam o modelo configurado em <a href="whatsapp.html" class="text-primary-accent" style="font-weight:600;">WhatsApp &gt; Aniversário</a>.</p>
      </div>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendario.js"></script>
  <script src="js/clientes-derivadas.js"></script>
</body>
</html>
