<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Simulação — Nova Agenda (protótipo, não afeta dados reais)</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .sim-aviso {
      background: var(--warning-soft);
      color: var(--warning);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-4);
    }
    .sim-slot {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      background: var(--card);
      cursor: pointer;
    }
    .sim-slot--livre { background: transparent; }
    .sim-slot--agendado { border-color: var(--primary); background: var(--primary-soft); }
    .sim-slot--bloqueado { border-style: dashed; opacity: 0.75; }
    .sim-slot__hora { width: 52px; flex-shrink: 0; font-weight: 700; font-variant-numeric: tabular-nums; }
    .sim-slot__body { flex: 1; }
    .sim-slot__titulo { font-weight: 600; }
    .sim-slot__sub { font-size: var(--text-sm); color: var(--text-secondary); }
    .sim-painel {
      background: var(--card-elevated);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-top: 8px;
    }
    .sim-chip-list { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    .sim-resultado {
      background: var(--card-elevated);
      border: 1px dashed var(--primary);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-top: 12px;
    }
    .sim-resultado__lista { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  </style>
</head>
<body data-page="simulacao">
  <div class="app">
    <main class="page">
      <div class="page-header-principal">
        <h1 class="page-header-principal__titulo">Simulação</h1>
      </div>

      <p class="sim-aviso">Protótipo isolado — usa dados próprios (não mexe na sua agenda real). Horário fixo 9h às 17h, só pra testar a lógica nova.</p>

      <section class="section">
        <h2 class="section__title">Grade da agenda</h2>
        <div class="row" style="gap:8px;flex-wrap:wrap;" id="js-sim-grade-chips"></div>
      </section>

      <section class="section">
        <h2 class="section__title">Seu WhatsApp (pra testar de verdade)</h2>
        <div class="field">
          <input class="input" id="js-sim-numero" placeholder="(00) 00000-0000" />
        </div>
      </section>

      <section class="section">
        <div class="row row--between" style="margin-bottom:12px;">
          <h2 class="section__title" style="margin-bottom:0;">Agenda simulada (9h–17h)</h2>
          <button class="btn btn--ghost btn--sm" id="js-sim-limpar">Limpar tudo</button>
        </div>
        <div id="js-sim-lista"></div>
      </section>

      <section class="section">
        <button class="btn btn--primary" id="js-sim-compartilhar" style="width:100%;">Compartilhar horários</button>
        <div class="sim-painel is-hidden" id="js-sim-painel-compartilhar">
          <p class="text-secondary" style="margin-bottom:4px;">Quanto tempo você quer disponibilizar?</p>
          <div class="sim-chip-list" id="js-sim-duracao-chips"></div>
          <button class="btn btn--secondary" id="js-sim-calcular" style="width:100%;">Calcular horários</button>
          <div class="sim-resultado is-hidden" id="js-sim-resultado">
            <p style="font-weight:700;">Horários encontrados (sem criar buracos):</p>
            <div class="sim-resultado__lista" id="js-sim-resultado-lista"></div>
            <button class="btn btn--primary" id="js-sim-enviar" style="width:100%;">Abrir no WhatsApp</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    /* ============================================================
       SIMULAÇÃO — protótipo isolado, chave própria de localStorage
       (agendaV3Sim:*), nunca toca em agendaV3:*. Sem dependência dos
       js/*.js do app real, propositalmente, pra zero risco de
       interferir nos dados de verdade.
       ============================================================ */
    const CHAVE_SIM = "agendaV3Sim:estado";
    const HORA_INICIO = "09:00";
    const HORA_FIM = "17:00";
    const GRADES_DISPONIVEIS = [15, 20, 30, 40, 45, 50, 60];

    function qs(sel, esc) { return (esc || document).querySelector(sel); }
    function qsa(sel, esc) { return Array.from((esc || document).querySelectorAll(sel)); }

    function horaParaMinutos(hora) {
      const [h, m] = hora.split(":").map(Number);
      return h * 60 + m;
    }
    function minutosParaHora(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }
    function somarMinutos(hora, minutos) {
      return minutosParaHora(horaParaMinutos(hora) + minutos);
    }

    function gerarGrade(horaInicio, horaFim, intervalo) {
      const lista = [];
      let atual = horaParaMinutos(horaInicio);
      const fim = horaParaMinutos(horaFim);
      while (atual < fim) {
        lista.push(minutosParaHora(atual));
        atual += intervalo;
      }
      return lista;
    }

    function estadoPadrao() {
      return {
        grade: 30,
        numero: "",
        proximoClienteTeste: 1,
        itens: [], // {hora, tipo: "agendado"|"bloqueado", duracao?: number, rotulo?: string}
      };
    }

    function obterEstado() {
      try {
        const bruto = localStorage.getItem(CHAVE_SIM);
        if (!bruto) return estadoPadrao();
        return { ...estadoPadrao(), ...JSON.parse(bruto) };
      } catch (e) {
        return estadoPadrao();
      }
    }
    function salvarEstado(estado) {
      localStorage.setItem(CHAVE_SIM, JSON.stringify(estado));
    }

    let estado = obterEstado();
    let painelAbertoHora = null;

    function gerarOpcoesDuracao(grade) {
      const opcoes = [];
      let total = 0;
      let mult = 1;
      while (true) {
        const valor = grade * mult;
        opcoes.push(valor);
        total = valor;
        mult++;
        if (total >= 120 && opcoes.length >= 3) break;
        if (opcoes.length > 20) break; // trava de segurança
      }
      return opcoes;
    }

    function renderizarGradeChips() {
      const container = qs("#js-sim-grade-chips");
      container.innerHTML = "";
      GRADES_DISPONIVEIS.forEach((valor) => {
        const chip = document.createElement("span");
        chip.className = "chip" + (valor === estado.grade ? " chip--ativo" : "");
        chip.textContent = `${valor} min`;
        chip.addEventListener("click", () => {
          estado.grade = valor;
          salvarEstado(estado);
          renderizarTudo();
        });
        container.appendChild(chip);
      });
    }

    function itemNaHora(hora) {
      return estado.itens.find((i) => i.hora === hora);
    }

    function abrirPainelSlot(hora, corpoContainer) {
      painelAbertoHora = hora;
      const painel = document.createElement("div");
      painel.className = "sim-painel";
      const opcoesDuracao = gerarOpcoesDuracao(estado.grade);
      painel.innerHTML = `
        <p class="text-secondary" style="margin-bottom:6px;">Duração do atendimento (opcional):</p>
        <div class="sim-chip-list" id="js-sim-duracao-agendar"></div>
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn btn--primary btn--sm" id="js-sim-btn-agendar">Agendar</button>
          <button class="btn btn--secondary btn--sm" id="js-sim-btn-bloquear">Bloquear</button>
        </div>
      `;
      corpoContainer.appendChild(painel);

      let duracaoEscolhida = null;
      const listaDuracao = qs("#js-sim-duracao-agendar", painel);
      opcoesDuracao.forEach((valor) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${valor} min`;
        chip.addEventListener("click", () => {
          duracaoEscolhida = valor;
          qsa(".chip", listaDuracao).forEach((c) => c.classList.remove("chip--ativo"));
          chip.classList.add("chip--ativo");
        });
        listaDuracao.appendChild(chip);
      });

      qs("#js-sim-btn-agendar", painel).addEventListener("click", () => {
        estado.itens.push({
          hora,
          tipo: "agendado",
          duracao: duracaoEscolhida,
          rotulo: `Cliente teste ${estado.proximoClienteTeste}`,
        });
        estado.proximoClienteTeste++;
        salvarEstado(estado);
        painelAbertoHora = null;
        renderizarTudo();
      });

      qs("#js-sim-btn-bloquear", painel).addEventListener("click", () => {
        estado.itens.push({ hora, tipo: "bloqueado" });
        salvarEstado(estado);
        painelAbertoHora = null;
        renderizarTudo();
      });
    }

    function renderizarLista() {
      const container = qs("#js-sim-lista");
      container.innerHTML = "";
      const grade = gerarGrade(HORA_INICIO, HORA_FIM, estado.grade);

      grade.forEach((hora) => {
        const item = itemNaHora(hora);
        const linha = document.createElement("div");

        if (item && item.tipo === "agendado") {
          linha.className = "sim-slot sim-slot--agendado";
          linha.innerHTML = `
            <span class="sim-slot__hora">${hora}</span>
            <div class="sim-slot__body">
              <p class="sim-slot__titulo">${item.rotulo}</p>
              <p class="sim-slot__sub">${item.duracao ? item.duracao + " min" : "sem duração definida"}</p>
            </div>
          `;
          linha.addEventListener("click", () => {
            estado.itens = estado.itens.filter((i) => i !== item);
            salvarEstado(estado);
            renderizarTudo();
          });
        } else if (item && item.tipo === "bloqueado") {
          linha.className = "sim-slot sim-slot--bloqueado";
          linha.innerHTML = `
            <span class="sim-slot__hora">${hora}</span>
            <div class="sim-slot__body"><p class="sim-slot__titulo">Bloqueado</p></div>
          `;
          linha.addEventListener("click", () => {
            estado.itens = estado.itens.filter((i) => i !== item);
            salvarEstado(estado);
            renderizarTudo();
          });
        } else {
          linha.className = "sim-slot sim-slot--livre";
          linha.innerHTML = `<span class="sim-slot__hora">${hora}</span><div class="sim-slot__body"><p class="sim-slot__sub">Livre</p></div>`;
          linha.addEventListener("click", () => {
            const jaAberto = painelAbertoHora === hora;
            painelAbertoHora = null;
            renderizarTudo();
            if (!jaAberto) {
              const linhaAtual = qsa(".sim-slot__hora", container).find((el) => el.textContent === hora).closest(".sim-slot");
              abrirPainelSlot(hora, linhaAtual.parentElement);
            }
          });
        }

        container.appendChild(linha);
      });
    }

    function calcularOcupados() {
      return estado.itens.map((item) => {
        const duracao = item.tipo === "bloqueado" ? estado.grade : (item.duracao || estado.grade);
        return { inicio: horaParaMinutos(item.hora), fim: horaParaMinutos(item.hora) + duracao };
      });
    }

    function proximoConflito(inicio, fim, ocupados) {
      let maiorFim = null;
      ocupados.forEach((r) => {
        if (r.inicio < fim && r.fim > inicio) {
          if (maiorFim === null || r.fim > maiorFim) maiorFim = r.fim;
        }
      });
      return maiorFim;
    }

    function arredondarParaGrade(minutoAlvo) {
      const inicioMin = horaParaMinutos(HORA_INICIO);
      const passos = Math.ceil((minutoAlvo - inicioMin) / estado.grade);
      return inicioMin + passos * estado.grade;
    }

    function calcularBlocos(duracao) {
      const ocupados = calcularOcupados();
      const fimMin = horaParaMinutos(HORA_FIM);
      const resultado = [];
      let ponteiro = horaParaMinutos(HORA_INICIO);

      while (ponteiro + duracao <= fimMin) {
        const conflito = proximoConflito(ponteiro, ponteiro + duracao, ocupados);
        if (conflito === null) {
          resultado.push(minutosParaHora(ponteiro));
          ponteiro += duracao;
        } else {
          const novoPonteiro = arredondarParaGrade(conflito);
          if (novoPonteiro <= ponteiro) { ponteiro += estado.grade; } else { ponteiro = novoPonteiro; }
        }
      }
      return resultado;
    }

    function renderizarPainelCompartilhar() {
      const container = qs("#js-sim-duracao-chips");
      container.innerHTML = "";
      const opcoes = gerarOpcoesDuracao(estado.grade);
      let duracaoEscolhida = opcoes[0];

      opcoes.forEach((valor, indice) => {
        const chip = document.createElement("span");
        chip.className = "chip" + (indice === 0 ? " chip--ativo" : "");
        chip.textContent = `${valor} min`;
        chip.addEventListener("click", () => {
          duracaoEscolhida = valor;
          qsa(".chip", container).forEach((c) => c.classList.remove("chip--ativo"));
          chip.classList.add("chip--ativo");
        });
        container.appendChild(chip);
      });

      qs("#js-sim-calcular").onclick = () => {
        const blocos = calcularBlocos(duracaoEscolhida);
        const resultadoBox = qs("#js-sim-resultado");
        const lista = qs("#js-sim-resultado-lista");
        lista.innerHTML = "";
        if (blocos.length === 0) {
          lista.innerHTML = `<p class="text-secondary">Nenhum horário de ${duracaoEscolhida}min disponível hoje.</p>`;
        } else {
          blocos.forEach((h) => {
            const chip = document.createElement("span");
            chip.className = "chip chip--ativo";
            chip.textContent = h;
            lista.appendChild(chip);
          });
        }
        resultadoBox.classList.remove("is-hidden");

        qs("#js-sim-enviar").onclick = () => {
          const digitos = (estado.numero || "").replace(/\D/g, "");
          if (!digitos) { alert("Digite seu número de WhatsApp ali em cima primeiro."); return; }
          const texto = `[Simulação] Horários de ${duracaoEscolhida}min disponíveis: ${blocos.join(", ") || "nenhum"}`;
          window.open(`https://wa.me/55${digitos}?text=${encodeURIComponent(texto)}`, "_blank");
        };
      };
    }

    function renderizarTudo() {
      renderizarGradeChips();
      renderizarLista();
      qs("#js-sim-numero").value = estado.numero || "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderizarTudo();

      qs("#js-sim-numero").addEventListener("input", (e) => {
        estado.numero = e.target.value;
        salvarEstado(estado);
      });

      qs("#js-sim-limpar").addEventListener("click", () => {
        estado = estadoPadrao();
        salvarEstado(estado);
        qs("#js-sim-painel-compartilhar").classList.add("is-hidden");
        renderizarTudo();
      });

      qs("#js-sim-compartilhar").addEventListener("click", () => {
        const painel = qs("#js-sim-painel-compartilhar");
        painel.classList.toggle("is-hidden");
        qs("#js-sim-resultado").classList.add("is-hidden");
        if (!painel.classList.contains("is-hidden")) renderizarPainelCompartilhar();
      });
    });
  </script>
</body>
</html>
