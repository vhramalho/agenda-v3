<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ranking de serviços — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="mais" data-titulo="Ranking de serviços">
  <div class="app">
    <main class="page">
      <div id="js-header-mount"></div>

      <div class="segmented section">
        <button class="icon-btn" id="js-ano-anterior" aria-label="Ano anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span id="js-ano-label" style="flex:1;text-align:center;font-weight:700;font-size:var(--text-sm);"></span>
        <button class="icon-btn" id="js-ano-proximo" aria-label="Próximo ano">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="card section" id="js-ranking-servicos-tabela"></div>
      <div class="empty-state is-hidden" id="js-ranking-servicos-vazio"><p class="empty-state__title">Ainda não há atendimentos realizados</p></div>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ranking-servicos.js"></script>
</body>
</html>
