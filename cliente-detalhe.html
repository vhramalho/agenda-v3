<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="clientes">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="window.history.back()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Cliente</h1>
        <a href="#" class="text-primary-accent" style="font-weight:600;font-size:var(--text-sm);" id="js-btn-editar-cliente">✎ Editar</a>
      </header>

      <div class="row section" style="align-items:flex-start;">
        <div class="avatar-wrap">
          <div class="list-item__avatar list-item__avatar--lg" id="js-cliente-avatar"></div>
        </div>
        <div style="flex:1;">
          <p style="font-weight:800;font-size:var(--text-lg);" id="js-cliente-nome"></p>
          <p class="row text-secondary is-hidden" style="margin-top:4px;" id="js-cliente-telefone-linha"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span id="js-cliente-telefone"></span></p>
          <p class="row text-secondary is-hidden" style="margin-top:4px;" id="js-cliente-aniversario-linha"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><span id="js-cliente-aniversario"></span></p>
          <p class="row text-secondary" style="margin-top:4px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18M5 7l1 13h12l1-13M9 7V5a3 3 0 0 1 6 0v2"/></svg><span id="js-cliente-desde"></span></p>
        </div>
      </div>

      <div class="card grid-2 section" style="grid-template-columns:1fr 1fr 1fr;text-align:center;">
        <div>
          <p style="font-weight:800;font-size:var(--text-lg);" id="js-cliente-visitas"></p>
          <p class="text-secondary" style="font-size:var(--text-xs);">visitas</p>
        </div>
        <div style="border-left:1px solid var(--border);border-right:1px solid var(--border);">
          <p style="font-weight:800;font-size:var(--text-lg);" id="js-cliente-faturado"></p>
          <p class="text-secondary" style="font-size:var(--text-xs);">faturados</p>
        </div>
        <div>
          <p style="font-weight:800;font-size:var(--text-lg);" id="js-cliente-ultima-visita"></p>
          <p class="text-secondary" style="font-size:var(--text-xs);">última visita</p>
        </div>
      </div>

      <div class="card section" style="display:flex;align-items:center;gap:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8"><path d="M4 4h16v16H4z" opacity="0"/><path d="M5 4h11l3 3v13H5z"/><path d="M9 4v4h6V4"/></svg>
        <div style="flex:1;">
          <p class="text-primary-accent" style="font-weight:600;font-size:var(--text-sm);">Observação</p>
          <p class="text-secondary" id="js-cliente-observacao"></p>
        </div>
      </div>

      <section class="section">
        <div class="row row--between" style="margin-bottom:12px;">
          <h2 class="section__title" style="margin-bottom:0;">Histórico de atendimentos</h2>
        </div>
        <div class="card" id="js-cliente-historico"></div>
        <div class="empty-state is-hidden" id="js-cliente-historico-vazio">
          <p class="empty-state__title">Nenhum atendimento ainda</p>
        </div>
      </section>

      <a href="#" class="btn btn--ghost is-hidden" style="display:flex;" id="js-cliente-whatsapp" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Enviar mensagem no WhatsApp
      </a>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <!-- Modais de cliente acionados a partir desta tela (o "Novo cliente" mora em clientes.html) -->
    <div class="modal-overlay is-hidden" id="modal-editar-cliente">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Editar cliente</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome</label><input class="input" id="js-editar-cliente-nome"/></div>
        <div class="field"><label class="field__label">Telefone</label><input class="input" id="js-editar-cliente-telefone"/></div>
        <div class="field"><label class="field__label">Aniversário</label><input class="input" id="js-editar-cliente-aniversario" placeholder="DD/MM"/></div>
        <div class="field"><label class="field__label">Observação</label><textarea class="textarea" id="js-editar-cliente-observacao"></textarea></div>
        <div class="btn-row"><button class="btn btn--primary" id="js-editar-cliente-salvar">Salvar alterações</button><button class="btn btn--danger" data-trocar-modal="modal-mover-lixeira">Mover para lixeira</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-mover-lixeira">
      <div class="modal-sheet" style="text-align:center;">
        <div class="modal-sheet__header" style="text-align:left;"><p class="modal-sheet__title" style="color:var(--danger);">Mover para lixeira</p><button class="modal-close">✕</button></div>
        <p class="text-secondary" style="margin-bottom:8px;">Tem certeza que deseja mover este cliente para a lixeira?</p>
        <p class="text-muted" style="font-size:var(--text-sm);margin-bottom:20px;">Atendimentos antigos não serão apagados.</p>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--danger-solid" id="js-confirmar-mover-lixeira">Continuar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/cliente-detalhe.js"></script>
</body>
</html>
