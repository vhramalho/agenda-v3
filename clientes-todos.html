<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Todos os clientes — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260708c" />
  <link rel="stylesheet" href="css/base.css?v=20260708c" />
  <link rel="stylesheet" href="css/layout.css?v=20260708c" />
  <link rel="stylesheet" href="css/components.css?v=20260708c" />
</head>
<body data-page="clientes">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Todos os clientes</h1>
        <div class="icon-btn" style="visibility:hidden" aria-hidden="true"></div>
      </header>

      <div class="input-icon section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="input" placeholder="Buscar cliente" id="js-busca-cliente-todos" />
      </div>

      <div class="segmented section">
        <span class="segmented__item is-active" data-ordem="az">A-Z</span>
        <span class="segmented__item" data-ordem="za">Z-A</span>
        <span class="segmented__item" data-ordem="novos">Novos</span>
        <span class="segmented__item" data-ordem="antigos">Antigos</span>
      </div>

      <div class="card" id="js-lista-clientes-todos"></div>
      <div class="empty-state is-hidden" id="js-clientes-todos-vazio">
        <p class="empty-state__title">Nenhum cliente encontrado</p>
      </div>

      <a href="clientes-lixeira.html" class="row section" style="justify-content:center;gap:6px;text-decoration:none;color:var(--danger);font-weight:600;font-size:var(--text-sm);margin-top:var(--space-5);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
        Lixeira
      </a>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js?v=20260708c"></script>
  <script src="js/menu.js?v=20260708c"></script>
  <script src="js/storage.js?v=20260708c"></script>
  <script src="js/tema.js?v=20260708c"></script>
  <script src="js/app.js?v=20260708c"></script>
  <script src="js/clientes-todos.js?v=20260708c"></script>
</body>
</html>
