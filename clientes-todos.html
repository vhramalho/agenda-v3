<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json?v=20260717g" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg?v=20260717g" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=20260717g" />
  <meta name="theme-color" content="#0B0B10" />
  <title>Todos os clientes — Swipo Agenda</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260717g" />
  <link rel="stylesheet" href="css/base.css?v=20260717g" />
  <link rel="stylesheet" href="css/layout.css?v=20260717g" />
  <link rel="stylesheet" href="css/components.css?v=20260717g" />
</head>
<body data-page="clientes">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Todos os clientes</h1>
        <button class="icon-btn icon-btn--accent" aria-label="Novo cliente" id="js-btn-novo-cliente">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>

      <div class="input-icon section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="input" placeholder="Buscar cliente" id="js-busca-cliente-todos" />
      </div>

      <div class="segmented section">
        <span class="segmented__item is-active" data-ordem="az">A-Z</span>
        <span class="segmented__item" data-ordem="za">Z-A</span>
        <span class="segmented__item" data-ordem="novos">Novos</span>
        <span class="segmented__item" data-ordem="antigos">Antigos</span>
      </div>

      <div class="card" id="js-lista-clientes-todos"></div>
      <div class="empty-state is-hidden" id="js-clientes-todos-vazio">
        <p class="empty-state__title">Nenhum cliente encontrado</p>
      </div>

      <a href="clientes-lixeira.html" class="row section" style="justify-content:center;gap:6px;text-decoration:none;color:var(--danger);font-weight:600;font-size:var(--text-sm);margin-top:var(--space-5);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
        Lixeira
      </a>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <div class="modal-overlay is-hidden" id="modal-novo-cliente">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Novo cliente</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome</label><input class="input" placeholder="Digite o nome do cliente" id="js-novo-cliente-nome"/></div>
        <div class="field"><label class="field__label">Telefone</label><input class="input" placeholder="(00) 00000-0000" id="js-novo-cliente-telefone"/></div>
        <div class="field"><label class="field__label">Aniversário</label><input class="input" placeholder="DD/MM" id="js-novo-cliente-aniversario"/></div>
        <div class="field"><label class="field__label">Observação</label><textarea class="textarea" placeholder="Alguma informação importante sobre o cliente..." id="js-novo-cliente-observacao"></textarea></div>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-novo-cliente-salvar">Salvar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=20260717g"></script>
  <script src="js/menu.js?v=20260717g"></script>
  <script src="js/storage.js?v=20260717g"></script>
  <script src="js/tema.js?v=20260717g"></script>
  <script src="js/modal.js?v=20260717g"></script>
  <script src="js/app.js?v=20260717g"></script>
  <script src="js/clientes-todos.js?v=20260717g"></script>
</body>
</html>
