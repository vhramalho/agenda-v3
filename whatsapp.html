<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json?v=20260717k" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg?v=20260717k" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=20260717k" />
  <meta name="theme-color" content="#0B0B10" />
  <title>WhatsApp — Swipo Agenda</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260717k" />
  <link rel="stylesheet" href="css/base.css?v=20260717k" />
  <link rel="stylesheet" href="css/layout.css?v=20260717k" />
  <link rel="stylesheet" href="css/components.css?v=20260717k" />
</head>
<body data-page="mais">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">WhatsApp</h1>
        <div class="icon-btn" style="visibility:hidden" aria-hidden="true"></div>
      </header>

      <div class="card card--destaque section row row--between">
        <div>
          <p class="text-primary-accent" style="font-weight:700;font-size:var(--text-sm);">MEU WHATSAPP</p>
          <p style="font-weight:800;font-size:var(--text-lg);" id="js-whatsapp-numero"></p>
        </div>
        <div style="display:flex;flex-direction:column;gap:var(--space-2);flex-shrink:0;">
          <button class="btn btn--primary btn--sm" data-abrir-modal="modal-editar-numero">Editar</button>
        </div>
      </div>

      <section class="section">
        <h2 class="section__title">Mensagens</h2>
        <div class="card">
          <button class="list-item" data-campo="mensagemHorarios" style="text-decoration:none;color:inherit;background:none;border:none;width:100%;text-align:left;">
            <div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></div>
            <div class="list-item__body">
              <p class="list-item__title">Horários disponíveis</p>
            </div>
            <svg class="list-item__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button class="list-item" data-campo="mensagemLembrete" style="text-decoration:none;color:inherit;background:none;border:none;width:100%;text-align:left;">
            <div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
            <div class="list-item__body">
              <p class="list-item__title">Lembrete de horário</p>
            </div>
            <svg class="list-item__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button class="list-item" data-campo="mensagemAniversario" style="text-decoration:none;color:inherit;background:none;border:none;width:100%;text-align:left;">
            <div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V11h16v10M2 11l2-4h16l2 4M9 7V4M12 7V3M15 7V4"/></svg></div>
            <div class="list-item__body">
              <p class="list-item__title">Aniversário</p>
            </div>
            <svg class="list-item__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button class="list-item" data-campo="mensagemEndereco" style="text-decoration:none;color:inherit;background:none;border:none;width:100%;text-align:left;">
            <div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></div>
            <div class="list-item__body">
              <p class="list-item__title">Endereço</p>
            </div>
            <svg class="list-item__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          <button class="list-item" data-campo="mensagemSemRetornar" style="text-decoration:none;color:inherit;background:none;border:none;width:100%;text-align:left;">
            <div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
            <div class="list-item__body">
              <p class="list-item__title">Sem retornar</p>
            </div>
            <svg class="list-item__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </button>
        </div>
      </section>

      <button class="btn btn--ghost" data-abrir-modal="modal-confirmar-restaurar-mensagens">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
        Restaurar mensagens padrão
      </button>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <!-- Markup duplicado de perfil.html (mesmo #modal-editar-numero, mesmo
         padrão de #modal-calendario duplicado entre páginas). -->
    <div class="modal-overlay is-hidden" id="modal-editar-numero">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Meu WhatsApp</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Número</label><input class="input" id="js-numero-input" placeholder="(00) 00000-0000"/></div>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-numero-salvar">Salvar</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-editar-mensagem">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title" id="js-mensagem-titulo">Editar mensagem</p><button class="modal-close">✕</button></div>
        <div class="field">
          <textarea class="textarea" id="js-mensagem-texto" style="min-height:120px;"></textarea>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;" id="js-mensagem-chips"></div>
        </div>
        <div class="field">
          <label class="field__label">Prévia (com dados de exemplo)</label>
          <div class="card" style="background:var(--card-elevated);">
            <p class="text-secondary" id="js-mensagem-preview" style="white-space:pre-wrap;overflow-wrap:anywhere;"></p>
          </div>
        </div>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-mensagem-salvar">Salvar</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-confirmar-restaurar-mensagens">
      <div class="modal-sheet" style="text-align:center;">
        <div class="modal-sheet__header" style="text-align:left;"><p class="modal-sheet__title">Restaurar mensagens padrão</p><button class="modal-close">✕</button></div>
        <p class="text-secondary" style="margin-bottom:20px;">Isso substitui as 5 mensagens pelos modelos originais do app. O número do WhatsApp não é alterado.</p>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-confirmar-restaurar-mensagens">Restaurar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=20260717k"></script>
  <script src="js/menu.js?v=20260717k"></script>
  <script src="js/storage.js?v=20260717k"></script>
  <script src="js/tema.js?v=20260717k"></script>
  <script src="js/app.js?v=20260717k"></script>
  <script src="js/modal.js?v=20260717k"></script>
  <script src="js/whatsapp.js?v=20260717k"></script>
</body>
</html>
