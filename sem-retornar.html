<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sem retornar — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="clientes" data-titulo="Sem retornar">
  <div class="app">
    <main class="page">
      <div id="js-header-mount"></div>

      <p class="text-secondary section">Clientes que estão há muito tempo sem voltar para atendimento.</p>

      <div class="insight-card section">
        <p class="insight-card__label"><span>Sem retornar</span></p>
        <p class="insight-card__valor" id="js-semretornar-contagem"></p>
        <p class="insight-card__comparacao text-secondary">clientes acompanhados</p>
      </div>

      <p class="text-secondary" style="font-size:var(--text-sm);margin-bottom:10px;">Filtrar por dias sem retornar</p>
      <div class="segmented section" id="js-semretornar-filtro">
        <span class="segmented__item" data-dias="20">20+</span>
        <span class="segmented__item is-active" data-dias="30">30+</span>
        <span class="segmented__item" data-dias="45">45+</span>
        <span class="segmented__item" data-dias="60">60+</span>
        <span class="segmented__item" data-dias="90">90+</span>
      </div>

      <div class="card section" id="js-semretornar-lista"></div>
      <div class="empty-state is-hidden" id="js-semretornar-vazio"><p class="empty-state__title">Nenhum cliente nesse filtro</p></div>

      <div class="card row section" style="margin-top:var(--space-5);">
        <span style="font-size:22px;">💜</span>
        <p class="text-secondary">Uma mensagem pode ser o convite que seu cliente precisava para voltar.</p>
      </div>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chips.js"></script>
  <script src="js/clientes-derivadas.js"></script>
</body>
</html>
