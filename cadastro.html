<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Criar conta — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260706w" />
  <link rel="stylesheet" href="css/base.css?v=20260706w" />
  <link rel="stylesheet" href="css/layout.css?v=20260706w" />
  <link rel="stylesheet" href="css/components.css?v=20260706w" />
  <link rel="stylesheet" href="css/auth.css?v=20260706w" />
</head>
<body data-page="cadastro">
  <div class="app">
    <main class="page page--secundaria">
      <button class="text-primary-accent" style="background:none;border:none;font-weight:600;font-size:var(--text-sm);padding:var(--space-4) 0 0;" onclick="window.history.back()">‹ Voltar</button>

      <div class="auth-marca">
        <div class="auth-marca__icone">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        </div>
        <p class="auth-marca__nome">Agenda <span class="text-primary-accent">V3</span></p>
      </div>

      <p class="auth-titulo">Criar sua conta</p>
      <p class="auth-subtitulo">Configure seu acesso e depois vamos preparar sua agenda.</p>

      <div class="card">
        <div class="field">
          <label class="field__label">Nome</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
            <input class="input" placeholder="Digite seu nome" />
          </div>
        </div>
        <div class="field">
          <label class="field__label">E-mail</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <input class="input" type="email" placeholder="seu@email.com" />
          </div>
        </div>
        <div class="field">
          <label class="field__label">Senha</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input class="input input--senha" type="password" placeholder="Digite sua senha" />
            <button class="input-icon__trailing" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="field">
          <label class="field__label">Confirmar senha</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input class="input input--senha" type="password" placeholder="Confirme sua senha" />
            <button class="input-icon__trailing" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="field">
          <label class="field__label">WhatsApp <span class="text-muted" style="font-weight:400;">opcional</span></label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <input class="input" placeholder="(32) 99999-9999" />
          </div>
        </div>
      </div>

      <a href="onboarding.html" class="btn btn--primary section">Criar conta</a>
      <a href="login.html" class="text-primary-accent" style="display:block;text-align:center;font-weight:600;margin-top:14px;">Já tenho conta</a>

      <p class="auth-rodape" style="margin-top:var(--space-6);">
        Ao criar conta, você concorda com
        <a href="termos.html" class="text-primary-accent">Termos de uso</a> e
        <a href="privacidade.html" class="text-primary-accent">Política de privacidade</a>.
      </p>
    </main>
  </div>

  <script src="js/utils.js?v=20260706w"></script>
  <script src="js/storage.js?v=20260706w"></script>
  <script src="js/tema.js?v=20260706w"></script>
  <script src="js/acoes-simuladas.js?v=20260706w"></script>
</body>
</html>
