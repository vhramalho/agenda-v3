<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <link rel="manifest" href="manifest.json?v=20260713c" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg?v=20260713c" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=20260713c" />
  <meta name="theme-color" content="#01082A" />
  <title>Serviços — Swipo Agenda</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260713c" />
  <link rel="stylesheet" href="css/base.css?v=20260713c" />
  <link rel="stylesheet" href="css/layout.css?v=20260713c" />
  <link rel="stylesheet" href="css/components.css?v=20260713c" />
</head>
<body data-page="mais">
  <div class="app">
    <main class="page">
      <header class="app-header" style="padding:0;margin-bottom:var(--space-5);">
        <button class="icon-btn" onclick="voltarOuInicio()" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="app-header__title">Serviços</h1>
        <button class="icon-btn icon-btn--accent" aria-label="Novo serviço" id="js-btn-novo-servico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>

      <section class="section">
        <h2 class="section__title">Todos os serviços</h2>
        <div class="card" id="js-lista-servicos"></div>
        <div class="empty-state is-hidden" id="js-servicos-vazio">
          <p class="empty-state__title">Nenhum serviço cadastrado</p>
          <p class="text-muted">Toque no + acima para criar o primeiro.</p>
        </div>
      </section>
    </main>

    <div id="js-bottom-nav-mount"></div>

    <!-- Modais de serviço — ligados de verdade ao localStorage (Fase 3) -->
    <div class="modal-overlay is-hidden" id="modal-novo-servico">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Novo serviço</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome do serviço</label><input class="input" id="js-novo-servico-nome" placeholder="Ex.: Corte + Barba"/></div>
        <div class="field"><label class="field__label">Valor opcional</label><input class="input" id="js-novo-servico-valor" placeholder="R$ 0,00"/></div>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--primary" id="js-novo-servico-salvar">Salvar</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-editar-servico">
      <div class="modal-sheet">
        <div class="modal-sheet__header"><p class="modal-sheet__title">Editar serviço</p><button class="modal-close">✕</button></div>
        <div class="field"><label class="field__label">Nome do serviço</label><input class="input" id="js-editar-servico-nome"/></div>
        <div class="field"><label class="field__label">Valor opcional</label><input class="input" id="js-editar-servico-valor"/></div>
        <div class="btn-row"><button class="btn btn--primary" id="js-editar-servico-salvar">Salvar</button><button class="btn btn--danger" data-trocar-modal="modal-confirmar-exclusao-servico">Excluir</button></div>
      </div>
    </div>

    <div class="modal-overlay is-hidden" id="modal-confirmar-exclusao-servico">
      <div class="modal-sheet" style="text-align:center;">
        <div class="modal-sheet__header" style="text-align:left;"><p class="modal-sheet__title">Excluir serviço?</p><button class="modal-close">✕</button></div>
        <p class="text-secondary" style="margin-bottom:20px;">Tem certeza que deseja excluir este serviço? Essa ação não pode ser desfeita.</p>
        <div class="btn-row"><button class="btn btn--secondary" data-fechar-modal>Cancelar</button><button class="btn btn--danger-solid" id="js-confirmar-exclusao-servico">Confirmar</button></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=20260713c"></script>
  <script src="js/menu.js?v=20260713c"></script>
  <script src="js/storage.js?v=20260713c"></script>
  <script src="js/tema.js?v=20260713c"></script>
  <script src="js/app.js?v=20260713c"></script>
  <script src="js/modal.js?v=20260713c"></script>
  <script src="js/servicos.js?v=20260713c"></script>
</body>
</html>
