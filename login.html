<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>Entrar — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css?v=20260712o" />
  <link rel="stylesheet" href="css/base.css?v=20260712o" />
  <link rel="stylesheet" href="css/layout.css?v=20260712o" />
  <link rel="stylesheet" href="css/components.css?v=20260712o" />
  <link rel="stylesheet" href="css/auth.css?v=20260712o" />
</head>
<body data-page="login">
  <div class="app">
    <main class="page page--secundaria">
      <div class="auth-marca">
        <div class="auth-marca__icone">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        </div>
        <p class="auth-marca__nome">Agenda <span class="text-primary-accent">V3</span></p>
      </div>

      <p class="auth-titulo">Entre na sua conta</p>
      <p class="auth-subtitulo">Acesse sua agenda, clientes e relatórios.</p>

      <div class="card">
        <div class="field">
          <label class="field__label">E-mail</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <input class="input" type="email" placeholder="seu@email.com" />
          </div>
        </div>
        <div class="field">
          <label class="field__label">Senha</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input class="input input--senha" type="password" placeholder="Digite sua senha" />
            <button class="input-icon__trailing" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <a href="index.html" class="btn btn--primary">Entrar</a>
        <a href="#" class="text-primary-accent" style="display:block;text-align:center;font-weight:600;margin-top:14px;">Esqueci minha senha</a>
      </div>

      <div class="auth-divisor">ou</div>

      <a href="cadastro.html" class="btn btn--ghost">Criar conta</a>

      <div class="stack section">
        <button class="btn btn--secondary">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M21.6 12.23c0-.68-.06-1.33-.17-1.95H12v3.68h5.4a4.62 4.62 0 0 1-2 3.03v2.5h3.23c1.9-1.75 2.97-4.32 2.97-7.26z"/><path fill="#34A853" d="M12 22c2.7 0 4.96-.9 6.62-2.43l-3.23-2.5c-.9.6-2.06.96-3.39.96-2.6 0-4.8-1.75-5.58-4.1H3.06v2.57A9.99 9.99 0 0 0 12 22z"/><path fill="#FBBC05" d="M6.42 13.93A6 6 0 0 1 6.1 12c0-.67.11-1.32.32-1.93V7.5H3.06A10 10 0 0 0 2 12c0 1.6.39 3.12 1.06 4.5l3.36-2.57z"/><path fill="#EA4335" d="M12 6.58c1.47 0 2.78.5 3.82 1.5l2.86-2.86A9.96 9.96 0 0 0 12 2a9.99 9.99 0 0 0-8.94 5.5l3.36 2.57c.78-2.35 2.98-4.1 5.58-4.1z"/></svg>
          Continuar com Google
        </button>
        <button class="btn btn--secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 1c.1 1.1-.3 2.2-1 3-.8.9-2 1.6-3.1 1.5-.1-1 .4-2.2 1.1-3C14.2 1.6 15.4 1 16.5 1zM20.7 17.2c-.5 1.1-.8 1.6-1.5 2.6-.9 1.4-2.3 3.1-3.9 3.1-1.5 0-1.9-1-3.9-1s-2.5 1-3.9 1c-1.6 0-3-1.6-3.9-3-2.6-4-3-9.4-1.2-12.1.9-1.4 2.5-2.3 4.1-2.3 1.6 0 2.6 1 3.9 1 1.3 0 2.1-1 3.9-1 1.4 0 3 .8 4 2.2-3.5 2-2.8 7.1 2.4 9.5z"/></svg>
          Continuar com Apple
        </button>
      </div>

      <p class="auth-rodape">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        Seus dados estão protegidos com <a href="#" class="text-primary-accent">segurança</a>.
      </p>
    </main>
  </div>

  <script src="js/utils.js?v=20260712o"></script>
  <script src="js/storage.js?v=20260712o"></script>
  <script src="js/tema.js?v=20260712o"></script>
  <script src="js/acoes-simuladas.js?v=20260712o"></script>
</body>
</html>
