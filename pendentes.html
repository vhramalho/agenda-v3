<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pendentes — Agenda V3</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="pendentes">
  <div class="app">
    <main class="page">
      <h1 class="page-header-principal__titulo section">Pendentes</h1>

      <div class="card card--destaque section">
        <p class="text-secondary">A receber</p>
        <p style="font-weight:800;font-size:var(--text-xl);margin:4px 0;" id="js-pendentes-valor"></p>
        <p class="text-primary-accent" style="font-weight:600;font-size:var(--text-sm);" id="js-pendentes-contagem"></p>
      </div>

      <section class="section">
        <div class="row row--between" style="margin-bottom:8px;">
          <h2 class="section__title" style="margin-bottom:0;" id="js-quem-deve-titulo">Quem deve</h2>
          <a href="pendentes-quem-deve.html" class="text-primary-accent" style="font-size:var(--text-sm);font-weight:600;">Ver todos</a>
        </div>
        <div class="card" id="js-quem-deve-lista"></div>
        <div class="empty-state is-hidden" id="js-quem-deve-vazio"><p class="empty-state__title">Nenhuma cobrança pendente</p></div>
      </section>

      <section class="section">
        <div class="row row--between" style="margin-bottom:8px;">
          <h2 class="section__title" style="margin-bottom:0;">Pagos recentemente</h2>
          <a href="pendentes-pagos.html" class="text-primary-accent" style="font-size:var(--text-sm);font-weight:600;">Ver todos</a>
        </div>
        <div class="card" id="js-pagos-lista"></div>
        <div class="empty-state is-hidden" id="js-pagos-vazio"><p class="empty-state__title">Nenhum pagamento recente</p></div>
      </section>

      <a href="pendentes-devedores.html" class="card section" style="display:block;text-decoration:none;color:inherit;">
        <div class="row row--between" style="margin-bottom:12px;">
          <div class="row">
            <span style="font-size:18px;">⚠️</span>
            <span style="font-weight:700;">Clientes que mais ficam devendo</span>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
        </div>
        <div class="stack" style="gap:10px;margin-bottom:12px;" id="js-devedores-lista"></div>
        <p class="text-secondary is-hidden" id="js-devedores-vazio">Nenhum cliente com pendência no momento.</p>
        <p class="text-primary-accent" style="text-align:center;font-weight:600;">Ver todos</p>
      </a>
    </main>

    <div id="js-bottom-nav-mount"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pendentes.js"></script>
</body>
</html>
